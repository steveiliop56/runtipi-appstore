x-runtipi:
  schema_version: 2
  overrides: []
services:
  mailpit:
    image: axllent/mailpit:v1.30.3
    volumes:
      - ${APP_DATA_DIR}/data:/data
    ports:
      - ${APP_PORT}:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    x-runtipi:
      is_main: true
      internal_port: 8025
