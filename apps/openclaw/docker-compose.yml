x-runtipi:
  schema_version: 2

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.3.28
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_GATEWAY_PASSWORD=${OPENCLAW_GATEWAY_PASSWORD}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=true
      - TZ=${TZ}
    volumes:
      - ${APP_DATA_DIR}/data:/home/node/.openclaw
    init: true
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "0.0.0.0",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    x-runtipi:
      internal_port: 18789
      is_main: true
